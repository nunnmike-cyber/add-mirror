// ─── SCORING CONFIGURATION ───────────────────────────────────────────
// Questions that map closest to ASRS Part A (highest clinical predictors)
const PART_A_QUESTIONS = ["a1", "a4", "a5", "a6", "a7", "e1", "e5"];

// Threshold: if a Part A question is answered 3 (Often) or 4 (Always), it counts as a "hit"
const PART_A_HIT_THRESHOLD = 3;

// Number of Part A hits needed for a strong positive screen
const PART_A_POSITIVE_SCREEN = 4;

// Core signal weights — grounded in adult ADHD predictive validity research
// Inattentive items are the strongest adult predictors (Kessler et al. 2005, 2007)
// Executive dysfunction is among the most impairing (Barkley 2011)
// Hyperactive/impulsive less predictive in adults but still relevant
// Emotional dysregulation supported by Barkley as core but not in DSM
// Hyperfocus helps differentiate ADHD from other attention difficulties
const CORE_SIGNAL_WEIGHTS = {
  inattentive: 0.40,
  executive: 0.20,
  hyperactive_impulsive: 0.20, // combined H+I cluster
  emotional: 0.10,
  hyperfocus: 0.10,
};

// Which questions feed into the core signal (excludes masking entirely)
const CORE_SIGNAL_QUESTIONS = {
  inattentive: ["c1", "c4", "c5", "a1", "a2", "a3", "a4", "a5", "a6", "a7"],
  executive: ["em4", "em5"],
  hyperactive_impulsive: ["c2", "c3", "e1", "e2", "e3", "e4", "e5", "e6"],
  emotional: ["em1", "em2"], // em6 (justice sensitivity) excluded — weak clinical signal
  hyperfocus: ["c6", "em3"],
};

// Masking questions — used only as a modifier, never in core signal
const MASKING_QUESTIONS = ["m1", "m2", "m3", "m4", "m5"];

// ─── SCORING FUNCTIONS ───────────────────────────────────────────────

function calculateClusterPercentages(answers, allQuestions) {
  const clusters = {};
  allQuestions.forEach((q) => {
    if (!clusters[q.cluster]) clusters[q.cluster] = { total: 0, max: 0 };
    clusters[q.cluster].total += answers[q.id] ?? 0;
    clusters[q.cluster].max += 4;
  });
  const pct = {};
  Object.keys(clusters).forEach((k) => {
    pct[k] = clusters[k].max > 0 ? Math.round((clusters[k].total / clusters[k].max) * 100) : 0;
  });
  return pct;
}

function calculateCoreSignal(answers) {
  // Calculate weighted percentage for each core cluster
  const clusterScores = {};
  for (const [cluster, questionIds] of Object.entries(CORE_SIGNAL_QUESTIONS)) {
    let total = 0;
    let max = 0;
    questionIds.forEach((qid) => {
      total += answers[qid] ?? 0;
      max += 4;
    });
    clusterScores[cluster] = max > 0 ? (total / max) * 100 : 0;
  }

  // Weighted combination
  let coreSignal = 0;
  for (const [cluster, weight] of Object.entries(CORE_SIGNAL_WEIGHTS)) {
    coreSignal += (clusterScores[cluster] || 0) * weight;
  }

  return Math.round(coreSignal);
}

function calculatePartAScreen(answers) {
  // Count how many Part A items score at or above threshold
  let hits = 0;
  PART_A_QUESTIONS.forEach((qid) => {
    if ((answers[qid] ?? 0) >= PART_A_HIT_THRESHOLD) {
      hits += 1;
    }
  });
  return {
    hits,
    total: PART_A_QUESTIONS.length,
    positive: hits >= PART_A_POSITIVE_SCREEN,
  };
}

function calculateMaskingModifier(answers) {
  let total = 0;
  let max = 0;
  MASKING_QUESTIONS.forEach((qid) => {
    total += answers[qid] ?? 0;
    max += 4;
  });
  const maskingPct = max > 0 ? Math.round((total / max) * 100) : 0;

  // Masking adjusts interpretation upward — compensating for score suppression
  // Formula: boost = (100 - coreSignal) * modifier
  // This scales proportionally: a moderate scorer gets more absolute lift than a high scorer
  let modifier = 0;
  let level = "low";
  if (maskingPct >= 70) { modifier = 0.15; level = "high"; }
  else if (maskingPct >= 50) { modifier = 0.08; level = "moderate"; }

  return { maskingPct, modifier, level };
}

function calculateChildhoodGate(answers) {
  // Childhood questions: c1–c6
  const childIds = ["c1", "c2", "c3", "c4", "c5", "c6"];
  let total = 0;
  let max = 0;
  childIds.forEach((qid) => {
    total += answers[qid] ?? 0;
    max += 4;
  });
  const pct = max > 0 ? Math.round((total / max) * 100) : 0;
  return { pct, low: pct < 25 };
}

function calculateFullScore(answers) {
  const coreSignal = calculateCoreSignal(answers);
  const partA = calculatePartAScreen(answers);
  const masking = calculateMaskingModifier(answers);
  const childhood = calculateChildhoodGate(answers);

  // Apply masking modifier
  const adjustedScore = Math.round(coreSignal + (100 - coreSignal) * masking.modifier);

  // Determine likelihood — driven by Part A threshold + adjusted score
  let likelihood = "Low";
  if (partA.positive && adjustedScore >= 55) {
    likelihood = "High";
  } else if (partA.positive || adjustedScore >= 55) {
    likelihood = "High";
  } else if (partA.hits >= 3 || adjustedScore >= 40) {
    likelihood = "Moderate";
  }

  // Override: if childhood gate is low AND adult score is high, flag but don't auto-downgrade
  const childhoodCaveat = childhood.low && adjustedScore >= 50;

  return {
    coreSignal,
    adjustedScore,
    partA,
    masking,
    childhood,
    likelihood,
    childhoodCaveat,
    maskingApplied: masking.modifier > 0,
    maskingBoost: adjustedScore - coreSignal,
  };
}

// ─── IMPAIRMENT & DIFFERENTIAL SCORING ───────────────────────────────

const IMPAIRMENT_QUESTIONS = ["imp1", "imp2", "imp3", "imp4", "imp5"];

const DIFFERENTIAL_ITEMS = {
  anxiety: { questions: ["d1"], label: "Anxiety", desc: "Anxiety can cause restlessness, poor concentration, and difficulty finishing tasks — all of which overlap heavily with ADHD. They also frequently co-occur." },
  depression: { questions: ["d2"], label: "Depression", desc: "Low mood, low motivation, and 'brain fog' from depression can look very similar to inattentive ADHD. Depression is also one of the most common conditions that co-exists with ADHD." },
  sleep: { questions: ["d3"], label: "Sleep difficulties", desc: "Poor sleep alone can produce most ADHD-like symptoms — difficulty concentrating, impulsivity, emotional reactivity, and memory problems. Many people with ADHD also have sleep disorders." },
  burnout: { questions: ["d4"], label: "Burnout / exhaustion", desc: "Chronic exhaustion impairs executive function, working memory, and emotional regulation in ways that closely mimic ADHD — and burnout is also very common in people who have undiagnosed ADHD." },
  onset: { questions: ["d5"], label: "Stress-linked onset", desc: "If your focus problems started or worsened after a stressful period, it's worth considering whether trauma, grief, or chronic stress could be a factor — either instead of, or in addition to, ADHD." },
};

function calculateImpairment(answers) {
  let total = 0;
  let max = 0;
  IMPAIRMENT_QUESTIONS.forEach((qid) => {
    total += answers[qid] ?? 0;
    max += 4;
  });
  const pct = max > 0 ? Math.round((total / max) * 100) : 0;
  let level = "low";
  if (pct >= 65) level = "significant";
  else if (pct >= 40) level = "moderate";
  return { pct, level };
}

function calculateDifferential(answers) {
  const flags = [];
  for (const [key, item] of Object.entries(DIFFERENTIAL_ITEMS)) {
    let total = 0;
    let max = 0;
    item.questions.forEach((qid) => {
      total += answers[qid] ?? 0;
      max += 4;
    });
    const score = answers[item.questions[0]] ?? 0;
    // Flag if answered "Often" (3) or "Always" (4)
    if (score >= 3) {
      flags.push({ key, label: item.label, desc: item.desc, score });
    }
  }
  return flags;
}

        {FREQUENCY_OPTIONS.map((f) => (
          <div key={f.value} style={{ flex: 1, textAlign: "center", fontFamily: "'Lora', Georgia, serif", fontSize: 10, color: COLORS.mutedLight, letterSpacing: "0.04em", textTransform: "uppercase" }}>
            {f.label}
          </div>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {section.questions.map((q, i) => (
          <QuestionRow key={q.id} question={q} value={answers[q.id]} onChange={(val) => onChange(q.id, val)} index={i} />
        ))}
      </div>

      <div style={{ display: "flex", gap: 12, marginTop: 48 }}>
        <button onClick={onBack} style={{ padding: "14px 28px", border: `2px solid ${COLORS.warm}`, borderRadius: 4, background: "transparent", color: COLORS.muted, fontFamily: "'Lora', Georgia, serif", fontSize: 15, cursor: "pointer" }}>
          ← Back
        </button>
        <button
          onClick={() => allAnswered && onNext()}
          style={{ padding: "14px 32px", border: "none", borderRadius: 4, background: allAnswered ? COLORS.accent : COLORS.warm, color: allAnswered ? "#fff" : COLORS.mutedLight, fontFamily: "'Playfair Display', Georgia, serif", fontSize: 16, fontWeight: 600, cursor: allAnswered ? "pointer" : "not-allowed", transition: "all 0.2s", flex: 1 }}
        >
          {isLast ? "See My Results →" : "Next →"}
        </button>
      </div>

      {!allAnswered && (
        <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 13, color: COLORS.mutedLight, marginTop: 12, textAlign: "center" }}>
          Please answer all questions to continue
        </p>
      )}
    </div>
  );
}

function QuestionRow({ question, value, onChange, index }) {
  const [hovered, setHovered] = useState(null);

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "14px 16px", background: value !== undefined ? COLORS.accentPale : index % 2 === 0 ? COLORS.paper : "transparent", borderRadius: 6, transition: "background 0.15s", border: `1px solid ${value !== undefined ? COLORS.accentLight + "44" : "transparent"}` }}>
      <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 15, color: COLORS.inkLight, lineHeight: 1.5, flex: 1, margin: 0, paddingRight: 16 }}>
        {question.text}
      </p>
      <div style={{ display: "flex", gap: 4 }}>
        {FREQUENCY_OPTIONS.map((opt) => {
          const selected = value === opt.value;
          const isHovered = hovered === opt.value;
          return (
            <button
              key={opt.value}
              onClick={() => onChange(opt.value)}
              onMouseEnter={() => setHovered(opt.value)}
              onMouseLeave={() => setHovered(null)}
              title={opt.label}
              style={{ width: 32, height: 32, borderRadius: "50%", border: `2px solid ${selected ? COLORS.accent : isHovered ? COLORS.accentLight : COLORS.warm}`, background: selected ? COLORS.accent : isHovered ? COLORS.accentPale : "transparent", cursor: "pointer", transition: "all 0.12s", display: "flex", alignItems: "center", justifyContent: "center" }}
            >
              {selected && <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#fff" }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── NARRATIVE GENERATION ────────────────────────────────────────────

function generateNarrative(clusterPct, context, scoring, answers) {
  const {
    inattentive = 0, hyperactive = 0, impulsive = 0,
    masking = 0, emotional = 0, executive = 0, hyperfocus = 0
  } = clusterPct;

  const { likelihood, partA, maskingApplied, maskingBoost, childhoodCaveat, adjustedScore } = scoring;

  // Calculate differential and impairment within narrative
  const diffFlags = calculateDifferential(answers);
  const imp = calculateImpairment(answers);

  const isWoman = context.gender === "Woman";
  const isNonBinary = context.gender === "Non-binary / other";
  const highMasking = masking >= 60;
  const highEmotional = emotional >= 60;
  const highExecutive = executive >= 60;
  const highHyperfocus = hyperfocus >= 60;
  const highInattentive = inattentive >= 60;
  const highHyperactive = hyperactive >= 60;
  const neverDiagnosed = context.diagnosed === "No, never";
  const suspectsDiagnosis = context.diagnosed === "I suspect I might have it";

  const parts = [];

  // Opening — tone based on likelihood, now referencing the stronger methodology
  if (likelihood === "High") {
    if (highMasking && (isWoman || isNonBinary)) {
      parts.push("What stands out most in your answers isn't just the symptoms themselves — it's how much energy you appear to spend managing them.");
    } else if (highMasking) {
      parts.push("Your results paint a picture of someone who has spent a long time finding ways to cope, often successfully enough that others may never have noticed the effort involved.");
    } else if (highInattentive && !highHyperactive) {
      parts.push("Your responses suggest a mind that works differently — one that struggles to find traction on things that don't capture it, while being capable of deep absorption when something does.");
    } else {
      parts.push("Across the areas we looked at, your answers align closely with how ADHD typically shows up in adults.");
    }
  } else if (likelihood === "Moderate") {
    parts.push("Your answers tell a mixed story — some areas show a strong pattern, while others are less pronounced — which is actually quite common, and doesn't mean your experiences aren't real.");
  } else {
    parts.push("While your results don't strongly point toward ADHD, that doesn't mean everything you're experiencing is simply 'normal' — and it's worth paying attention to the areas where you did score higher.");
  }

  // Part A screen reference — concrete and clinically grounded
  if (partA.positive) {
    parts.push(`On the seven questions most strongly linked to adult ADHD in clinical research, you scored at a significant level on ${partA.hits} of them — which meets the threshold for a positive screen on the WHO's adult ADHD scale.`);
  } else if (partA.hits >= 3) {
    parts.push(`You scored at a significant level on ${partA.hits} of the seven questions most strongly linked to adult ADHD — just below the clinical screening threshold, but enough to suggest these difficulties are real and worth taking seriously.`);
  }

  // Cluster-specific insights
  if (highInattentive && highHyperactive) {
    parts.push("You show signs of both the inattentive and hyperactive sides of ADHD — the internal restlessness and the difficulty holding focus can be an exhausting combination, even if it isn't always visible to others.");
  } else if (highInattentive && !highHyperactive) {
    parts.push("Your profile leans heavily toward the inattentive presentation — sometimes called ADD — where the struggle isn't so much about energy as it is about finding the mental traction to start, sustain, and finish things.");
  } else if (highHyperactive && !highInattentive) {
    parts.push("Your restlessness and impulsivity come through clearly — the kind of internal hum that's hard to explain to people who don't experience it, and that can make stillness feel genuinely uncomfortable.");
  }

  // Masking modifier — explain the adjustment transparently
  if (maskingApplied && maskingBoost > 0) {
    parts.push(`Your high masking score is significant — it suggests your raw symptom scores may understate the real picture, because you've learned to compensate. We've adjusted your overall score upward by ${maskingBoost} points to account for this.`);
  } else if (highMasking && !maskingApplied) {
    parts.push("Your masking score is notable — the effort you put into appearing on top of things is real, and it means the full weight of your symptoms may not be visible, even to yourself.");
  }

  // Emotional / executive callouts
  if (highEmotional && highExecutive) {
    parts.push("Two things particularly stand out: the intensity with which you experience emotions, and the executive dysfunction — the paralysis, the time blindness — which is often one of the most impairing aspects of ADHD in adults.");
  } else if (highEmotional) {
    parts.push("The emotional intensity you described — the way criticism lands harder, the feeling that your reactions are bigger than the situation — is a genuine and often overlooked part of ADHD that rarely makes it into the standard checklists.");
  } else if (highExecutive) {
    parts.push("The executive dysfunction piece — the procrastination that feels like paralysis, the time blindness — came through clearly and is often one of the most impairing aspects of ADHD in adults.");
  }

  // Childhood caveat
  if (childhoodCaveat) {
    parts.push("One thing worth noting: your childhood scores were relatively low compared to your adult scores. This could mean several things — effective early masking, a supportive environment that minimised difficulties, or symptoms that genuinely emerged later — and it's something a professional assessment would explore further.");
  }

  // Impairment note
  if (imp.level === "significant" && likelihood === "High") {
    parts.push("Importantly, these aren't just abstract symptoms — you've described real impact on your work, relationships, or how you feel about yourself, which is exactly what clinicians look for alongside the symptom picture.");
  } else if (imp.level === "low" && likelihood === "High") {
    parts.push("Interestingly, while your symptom scores are high, your reported day-to-day impact is lower — which could mean your coping strategies are working hard behind the scenes, or that the impact is showing up in ways that are harder to name.");
  }

  // Differential note
  if (diffFlags.length >= 2 && likelihood === "High") {
    parts.push("It's also worth knowing that you flagged in several areas that commonly co-exist with ADHD — including " + diffFlags.map(f => f.label.toLowerCase()).join(" and ") + ". This doesn't weaken your ADHD result; these conditions frequently travel together, and a thorough assessment will explore all of them.");
  } else if (diffFlags.length >= 2 && likelihood !== "High") {
    parts.push("You also flagged in areas beyond ADHD — including " + diffFlags.map(f => f.label.toLowerCase()).join(" and ") + " — which can produce symptoms that look a lot like ADHD. A professional can help work out which pieces of the puzzle are primary.");
  } else if (diffFlags.length === 1 && likelihood === "Low") {
    parts.push("Your " + diffFlags[0].label.toLowerCase() + " flag is worth paying attention to — it could be contributing to the focus and energy difficulties you're experiencing, and it deserves its own attention whether or not ADHD is part of the picture.");
  }

  // Gender-aware closing
  if ((isWoman || isNonBinary) && highInattentive && neverDiagnosed) {
    parts.push(`As ${isWoman ? "a woman" : "someone"} who has never been diagnosed, it's worth knowing that inattentive ADHD is systematically underdiagnosed in people who aren't male — often because the symptoms are quieter, better masked, and easier for others (and ourselves) to explain away.`);
  } else if (highHyperfocus && likelihood !== "Low") {
    parts.push("The flip side of your attention difficulties also came through — that capacity for deep, absorbing focus when something captures you is real, and often the part of ADHD that people find hardest to believe sits alongside the struggles.");
  } else if (suspectsDiagnosis && likelihood === "High") {
    parts.push("If you've suspected this for a while, your instincts appear to have been worth listening to — and these results give you something concrete to take to a professional.");
  } else if (likelihood === "Low") {
    parts.push("It may be worth exploring whether anxiety, burnout, or disrupted sleep could be at the root of what you're experiencing — all of which can look remarkably similar to ADHD and deserve just as much attention.");
  }

  return parts.join(" ");
}

function usePersonalNarrative(clusterPct, context, scoring, answers) {
  const [narrative, setNarrative] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const timer = setTimeout(() => {
      const text = generateNarrative(clusterPct, context, scoring, answers);
      setNarrative(text);
      setLoading(false);
    }, 1800);
    return () => clearTimeout(timer);
  }, []);

  return { narrative, loading };
}

function PersonalNarrative({ clusterPct, context, scoring, answers }) {
  const { narrative, loading } = usePersonalNarrative(clusterPct, context, scoring, answers);

  return (
    <div style={{ background: COLORS.ink, borderRadius: 12, padding: "36px 40px", marginBottom: 36, position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: 16, left: 24, fontFamily: "'Playfair Display', Georgia, serif", fontSize: 120, lineHeight: 1, color: COLORS.accent, opacity: 0.15, pointerEvents: "none", userSelect: "none" }}>
        "
      </div>

      <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 11, letterSpacing: "0.2em", color: COLORS.accentLight, textTransform: "uppercase", margin: "0 0 16px" }}>
        Your Personal Profile
      </p>

      {loading ? (
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 18, height: 18, borderRadius: "50%", border: `2px solid ${COLORS.accentLight}`, borderTopColor: "transparent", animation: "spin 0.8s linear infinite" }} />
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 15, color: COLORS.mutedLight, margin: 0, fontStyle: "italic" }}>
            Reading your results carefully…
          </p>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      ) : (
        <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 18, lineHeight: 1.8, color: "#F9F5EE", margin: 0, position: "relative", zIndex: 1 }}>
          {narrative}
        </p>
      )}
    </div>
  );
}

// ─── RESULTS SCREEN ──────────────────────────────────────────────────

function ResultsScreen({ answers, context }) {
  const allQuestions = SECTIONS.filter((s) => s.type === "questions").flatMap((s) => s.questions);

  // Calculate display cluster percentages (all 7 clusters, for the breakdown bars)
  const clusterPct = calculateClusterPercentages(answers, allQuestions);

  // Calculate the new clinically-grounded score
  const scoring = calculateFullScore(answers);
  const { coreSignal, adjustedScore, partA, masking, likelihood, maskingApplied, maskingBoost, childhoodCaveat } = scoring;

  // Calculate impairment and differential
  const impairment = calculateImpairment(answers);
  const differentialFlags = calculateDifferential(answers);

  // Determine dominant presentation type
  const inattentivePct = clusterPct.inattentive || 0;
  const hyperactivePct = clusterPct.hyperactive || 0;
  const isInattentiveDominant = inattentivePct > hyperactivePct + 15;
  const isHyperactiveDominant = hyperactivePct > inattentivePct + 15;
  const isWoman = context.gender === "Woman";
  const highMasking = (clusterPct.masking || 0) >= 60;

  let likelihoodColor = COLORS.teal;
  let likelihoodBg = COLORS.tealPale;
  if (likelihood === "High") { likelihoodColor = COLORS.accent; likelihoodBg = COLORS.accentPale; }
  else if (likelihood === "Moderate") { likelihoodColor = "#C47A00"; likelihoodBg = "#FFF3CC"; }

  let typeLabel = "Combined Type";
  if (isInattentiveDominant) typeLabel = "Inattentive Type (ADD)";
  if (isHyperactiveDominant) typeLabel = "Hyperactive-Impulsive Type";

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "60px 24px 80px" }}>
      <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 11, letterSpacing: "0.2em", color: COLORS.accent, textTransform: "uppercase", marginBottom: 16 }}>
        Your Results
      </div>

      {/* ── Overall verdict ── */}
      <div style={{ background: likelihoodBg, border: `2px solid ${likelihoodColor}`, borderRadius: 12, padding: "32px 36px", marginBottom: 36 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
          <div>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: likelihoodColor, margin: "0 0 6px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>
              ADHD Likelihood
            </p>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 52, fontWeight: 700, color: likelihoodColor, margin: 0, lineHeight: 1 }}>
              {likelihood}
            </h2>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 16, color: COLORS.inkLight, margin: "10px 0 6px" }}>
              Suggested presentation: <strong>{typeLabel}</strong>
            </p>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.muted, margin: 0, lineHeight: 1.6, maxWidth: 420 }}>
              {isInattentiveDominant && likelihood === "High" && "Your answers show a strong and consistent pattern across attention, organisation, and emotional regulation — the three areas most associated with inattentive ADHD in adults."}
              {isHyperactiveDominant && likelihood === "High" && "Your answers show a strong and consistent pattern across restlessness, impulsivity, and difficulty with stillness — the areas most associated with hyperactive ADHD in adults."}
              {!isInattentiveDominant && !isHyperactiveDominant && likelihood === "High" && "Your answers show a strong and consistent pattern across both attention and energy — reflecting the combined presentation of ADHD."}
              {likelihood === "Moderate" && "Your answers show a meaningful pattern in several areas. This could reflect mild symptoms, effective coping, or a presentation worth exploring further."}
              {likelihood === "Low" && "Your answers don't show a strong overall pattern consistent with ADHD — though some individual areas may still be worth reflecting on."}
            </p>
          </div>
          <div style={{ width: 90, height: 90, borderRadius: "50%", border: `4px solid ${likelihoodColor}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <span style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 26, fontWeight: 700, color: likelihoodColor }}>
              {adjustedScore}%
            </span>
          </div>
        </div>

        {/* ── Scoring detail panel ── */}
        <div style={{ marginTop: 20, paddingTop: 20, borderTop: `1px solid ${likelihoodColor}33` }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 16 }}>
            <ScoringPill label="Core signal" value={`${coreSignal}%`} />
            <ScoringPill label="Part A screen" value={`${partA.hits}/${partA.total} items`} highlight={partA.positive} />
            {maskingApplied && (
              <ScoringPill label="Masking adjustment" value={`+${maskingBoost} pts`} highlight />
            )}
            <ScoringPill label="Functional impact" value={impairment.level === "significant" ? "Significant" : impairment.level === "moderate" ? "Moderate" : "Low"} highlight={impairment.level === "significant"} />
          </div>
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 12, color: COLORS.muted, margin: 0, lineHeight: 1.6 }}>
            <strong>How we score this:</strong> Your core signal is a weighted score across inattentive (40%), executive dysfunction (20%), hyperactive-impulsive (20%), emotional (10%), and hyperfocus (10%) clusters — based on which symptoms are most predictive of ADHD in adults. The Part A screen counts how many of the 7 highest-signal questions you answered 'Often' or 'Always'. Masking is treated as a modifier that adjusts your score upward, reflecting that strong coping can suppress raw symptom scores.
          </p>
        </div>
      </div>

      {/* ── Personal narrative ── */}
      <PersonalNarrative clusterPct={clusterPct} context={context} scoring={scoring} answers={answers} />

      {/* ── Masking callout ── */}
      {highMasking && (
        <div style={{ background: COLORS.tealPale, border: `1px solid ${COLORS.tealLight}`, borderRadius: 10, padding: "20px 24px", marginBottom: 28, display: "flex", gap: 16, alignItems: "flex-start" }}>
          <span style={{ fontSize: 24 }}>⚠️</span>
          <div>
            <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 17, fontWeight: 700, color: COLORS.teal, margin: "0 0 6px" }}>
              High masking detected
            </p>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>
              Your answers suggest you may be working very hard to compensate for ADHD symptoms. This is especially common in {isWoman ? "women and girls" : "adults"} diagnosed later in life. Masking can make standard assessments underestimate how much you're struggling — your real experience may be more significant than your score suggests.
              {maskingApplied && ` We've added ${maskingBoost} points to your score to partially account for this, but no formula fully captures the cost of constant compensation.`}
            </p>
          </div>
        </div>
      )}

      {/* ── Childhood caveat ── */}
      {childhoodCaveat && (
        <div style={{ background: "#FFF8E1", border: "1px solid #FFD54F", borderRadius: 10, padding: "20px 24px", marginBottom: 28, display: "flex", gap: 16, alignItems: "flex-start" }}>
          <span style={{ fontSize: 24 }}>📝</span>
          <div>
            <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 17, fontWeight: 700, color: "#8D6E00", margin: "0 0 6px" }}>
              A note about your childhood scores
            </p>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>
              ADHD requires symptoms to have been present before age 12, but your childhood section scored lower than your adult sections. This doesn't rule anything out — many people (especially women and those with inattentive presentations) masked effectively in childhood, or had supportive environments that reduced the impact of symptoms. A professional assessment would explore this in more detail.
            </p>
          </div>
        </div>
      )}

      {/* ── Gender note ── */}
      {isWoman && isInattentiveDominant && (
        <div style={{ background: "#F5F0FF", border: "1px solid #C4A8FF", borderRadius: 10, padding: "20px 24px", marginBottom: 28, display: "flex", gap: 16, alignItems: "flex-start" }}>
          <span style={{ fontSize: 24 }}>💜</span>
          <div>
            <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 17, fontWeight: 700, color: "#6B3FA0", margin: "0 0 6px" }}>
              A note for women with inattentive ADHD
            </p>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>
              Research consistently shows that women are diagnosed with ADHD years later than men, on average. Inattentive symptoms — the type you score higher in — are quieter and easier to miss. If a professional has ever dismissed your concerns, it may be worth seeking a specialist who is experienced with adult ADHD in women.
            </p>
          </div>
        </div>
      )}

      {/* ── Cluster breakdown ── */}
      <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 24, fontWeight: 700, color: COLORS.ink, margin: "40px 0 20px" }}>
        Your symptom breakdown
      </h3>

      <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 48 }}>
        {[
          { key: "inattentive", label: "Inattention", pct: clusterPct.inattentive || 0, desc: "Difficulty focusing, following through, and staying organised", weight: "40% of core signal", typical: 20 },
          { key: "executive", label: "Executive Dysfunction", pct: clusterPct.executive || 0, desc: "Time blindness, procrastination paralysis, task initiation", weight: "20% of core signal", typical: 22 },
          { key: "hyperactive", label: "Hyperactivity", pct: clusterPct.hyperactive || 0, desc: "Restlessness, difficulty sitting still, feeling 'switched on'", weight: "Combined 20%", typical: 18 },
          { key: "impulsive", label: "Impulsivity", pct: clusterPct.impulsive || 0, desc: "Acting before thinking, interrupting, difficulty waiting", weight: "Combined 20%", typical: 15 },
          { key: "emotional", label: "Emotional Intensity", pct: clusterPct.emotional || 0, desc: "Strong emotional reactions, rejection sensitivity, justice sensitivity", weight: "10% of core signal", typical: 25 },
          { key: "hyperfocus", label: "Hyperfocus", pct: clusterPct.hyperfocus || 0, desc: "Intense absorption in things you love — the flip side of inattention", weight: "10% of core signal", typical: 28 },
          { key: "masking", label: "Masking & Compensation", pct: clusterPct.masking || 0, desc: "Effort spent hiding or compensating for symptoms — acts as a modifier, not a symptom", weight: "Modifier only", typical: 20 },
        ].map((item) => (
          <ClusterBar key={item.key} {...item} />
        ))}
      </div>

      <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 12, color: COLORS.mutedLight, lineHeight: 1.6, marginBottom: 48, marginTop: -36 }}>
        The <span style={{ display: "inline-block", width: 8, height: 2, background: COLORS.ink, opacity: 0.25, verticalAlign: "middle", margin: "0 4px" }}></span> marker on each bar shows where most adults without ADHD tend to score on these questions. Figures are approximate, derived from ASRS validation studies and general population screening data.
      </p>

      {/* ── Functional Impairment ── */}
      <div style={{ marginBottom: 48 }}>
        <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 24, fontWeight: 700, color: COLORS.ink, margin: "0 0 12px" }}>
          How much is it affecting your life?
        </h3>
        <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.muted, lineHeight: 1.6, marginBottom: 20, maxWidth: 560 }}>
          A clinical ADHD diagnosis requires not just symptoms, but evidence that those symptoms cause real difficulties across multiple areas of your life.
        </p>

        <div style={{
          background: impairment.level === "significant" ? COLORS.accentPale : impairment.level === "moderate" ? "#FFF3CC" : COLORS.tealPale,
          border: `2px solid ${impairment.level === "significant" ? COLORS.accent : impairment.level === "moderate" ? "#C47A00" : COLORS.teal}`,
          borderRadius: 10, padding: "24px 28px",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <span style={{
              fontFamily: "'Playfair Display', Georgia, serif", fontSize: 20, fontWeight: 700,
              color: impairment.level === "significant" ? COLORS.accent : impairment.level === "moderate" ? "#C47A00" : COLORS.teal,
            }}>
              {impairment.level === "significant" ? "Significant impact" : impairment.level === "moderate" ? "Moderate impact" : "Lower impact"}
            </span>
            <span style={{
              fontFamily: "'Playfair Display', Georgia, serif", fontSize: 18, fontWeight: 700,
              color: impairment.level === "significant" ? COLORS.accent : impairment.level === "moderate" ? "#C47A00" : COLORS.teal,
            }}>
              {impairment.pct}%
            </span>
          </div>
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>
            {impairment.level === "significant" && "Your answers suggest these difficulties are having a real and substantial effect on your work, relationships, self-esteem, or daily functioning. This is an important piece of evidence for any professional assessment."}
            {impairment.level === "moderate" && "Your answers suggest these difficulties are affecting some areas of your life, though not across the board. This is still worth raising with a professional — impact doesn't have to be catastrophic to be clinically meaningful."}
            {impairment.level === "low" && "Your answers suggest these difficulties aren't causing major disruption to your life right now. This doesn't rule out ADHD — but it does suggest that either your symptoms are mild, your coping strategies are effective, or the impact is showing up in ways this section didn't capture."}
          </p>
          {impairment.level === "significant" && likelihood === "High" && (
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 13, color: COLORS.muted, lineHeight: 1.6, marginTop: 12, fontStyle: "italic" }}>
              High symptom scores combined with significant functional impact is precisely what clinicians look for when assessing ADHD.
            </p>
          )}
          {impairment.level === "low" && likelihood === "High" && (
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 13, color: COLORS.muted, lineHeight: 1.6, marginTop: 12, fontStyle: "italic" }}>
              Note: Your ADHD symptom scores are high but your reported impact is low. This could mean you're masking effectively, that you've structured your life around your difficulties, or that the impairment is showing up in subtler ways. A professional can help explore this.
            </p>
          )}
        </div>
      </div>

      {/* ── Differential Screen ── */}
      {differentialFlags.length > 0 && (
        <div style={{ marginBottom: 48 }}>
          <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 24, fontWeight: 700, color: COLORS.ink, margin: "0 0 12px" }}>
            Other things worth exploring
          </h3>
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.muted, lineHeight: 1.6, marginBottom: 20, maxWidth: 560 }}>
            {likelihood === "High" || likelihood === "Moderate"
              ? "Your ADHD scores are notable — but you also flagged in areas that overlap with or commonly co-occur alongside ADHD. This doesn't weaken your ADHD result; it means a professional assessment should consider the full picture."
              : "Your ADHD scores were lower, but you flagged in some areas that can produce ADHD-like symptoms on their own. It's worth exploring these with a professional."}
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {differentialFlags.map((flag) => (
              <div
                key={flag.key}
                style={{
                  background: "#FFF8F0",
                  border: "1px solid #F0D9B5",
                  borderRadius: 10,
                  padding: "18px 22px",
                  display: "flex",
                  gap: 14,
                  alignItems: "flex-start",
                }}
              >
                <div style={{
                  width: 36, height: 36, borderRadius: "50%",
                  background: "#F5E6D0", display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0, marginTop: 2,
                }}>
                  <span style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 14, fontWeight: 700, color: "#A07030" }}>
                    {flag.key === "anxiety" ? "😰" : flag.key === "depression" ? "😔" : flag.key === "sleep" ? "😴" : flag.key === "burnout" ? "🔥" : "⚡"}
                  </span>
                </div>
                <div>
                  <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 16, fontWeight: 700, color: COLORS.ink, margin: "0 0 4px" }}>
                    {flag.label} {flag.score === 4 ? "(strong signal)" : "(flagged)"}
                  </p>
                  <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 13, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>
                    {flag.desc}
                  </p>
                </div>
              </div>
            ))}
          </div>

          <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 12, color: COLORS.mutedLight, lineHeight: 1.6, marginTop: 14 }}>
            {likelihood === "High"
              ? "These flags don't reduce your ADHD likelihood — ADHD very commonly co-occurs with anxiety (53%), depression (58%), and sleep difficulties (37%). A good assessment will explore all of these together."
              : "A professional can help untangle which of these are primary and which might be consequences of each other."}
          </p>
        </div>
      )}

      {/* ── What next ── */}
      <div style={{ borderTop: `2px solid ${COLORS.warm}`, paddingTop: 40 }}>
        <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 24, fontWeight: 700, color: COLORS.ink, marginBottom: 20 }}>
          What should you do next?
        </h3>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {likelihood === "High" && (
            <NextStep icon="🩺" title="Speak to a professional" body="Your results suggest it's worth seeking a formal assessment. Ask your GP for a referral to a psychiatrist or clinical psychologist with ADHD experience. Bring these results with you — they can help start the conversation." />
          )}
          {likelihood === "Moderate" && (
            <NextStep icon="📋" title="Keep track of your experiences" body="Your results are in a borderline range. It may be worth journalling your symptoms for a few weeks and then speaking to your GP — especially if you're experiencing real difficulties at work, in relationships, or with your wellbeing." />
          )}
          {likelihood === "Low" && (
            <NextStep icon="🔍" title="Consider other explanations" body="Your results don't strongly suggest ADHD. However, anxiety, depression, sleep disorders, and burnout can all cause similar symptoms. If you're struggling, it's always worth talking to your GP." />
          )}
          <NextStep icon="📚" title="Learn more about how ADHD actually feels" body="Books like 'ADHD 2.0' (Hallowell & Ratey), 'Scattered Minds' (Gabor Maté), and 'Women with ADHD' (Sari Solden) describe the inner experience of ADHD in ways that can be genuinely illuminating — whether or not you have a diagnosis." />
          <NextStep icon="💡" title="What this result actually means" body="A screening tool like this can help you recognise patterns and give you language for experiences you may have struggled to name for years. It can't tell you definitively whether you have ADHD — but it can tell you whether your experiences align with how ADHD tends to show up in adults. That's a meaningful first step." />
        </div>
      </div>

      {/* ── GP Export ── */}
      <div style={{ marginTop: 48, padding: "28px 32px", background: COLORS.paper, border: `2px solid ${COLORS.warm}`, borderRadius: 12 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 16 }}>
          <span style={{ fontSize: 28, flexShrink: 0 }}>🩺</span>
          <div style={{ flex: 1 }}>
            <h4 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 20, fontWeight: 700, color: COLORS.ink, margin: "0 0 8px" }}>
              Take this to your GP
            </h4>
            <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.muted, lineHeight: 1.6, margin: "0 0 20px" }}>
              Download a clean summary of your results to print or share with a healthcare professional. It includes your scores, cluster breakdown, and relevant clinical context — designed to help start a productive conversation.
            </p>
            <button
              onClick={() => generateGPExport(clusterPct, scoring, context, typeLabel, impairment, differentialFlags)}
              style={{ background: COLORS.teal, color: "#fff", border: "none", borderRadius: 4, padding: "14px 28px", fontFamily: "'Playfair Display', Georgia, serif", fontSize: 16, fontWeight: 600, cursor: "pointer", transition: "background 0.2s" }}
              onMouseOver={(e) => (e.target.style.background = COLORS.tealLight)}
              onMouseOut={(e) => (e.target.style.background = COLORS.teal)}
            >
              Download GP Summary
            </button>
          </div>
        </div>
      </div>

      <button
        onClick={() => window.location.reload()}
        style={{ marginTop: 24, padding: "14px 28px", border: `2px solid ${COLORS.warm}`, borderRadius: 4, background: "transparent", color: COLORS.muted, fontFamily: "'Lora', Georgia, serif", fontSize: 15, cursor: "pointer" }}
      >
        ← Start over
      </button>
    </div>
  );
}

function ScoringPill({ label, value, highlight }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 8,
      background: highlight ? COLORS.accentPale : COLORS.paper,
      border: `1px solid ${highlight ? COLORS.accentLight + "66" : COLORS.warm}`,
      borderRadius: 20, padding: "6px 14px",
    }}>
      <span style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 12, color: COLORS.muted }}>{label}</span>
      <span style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 14, fontWeight: 700, color: highlight ? COLORS.accent : COLORS.ink }}>{value}</span>
    </div>
  );
}

function ClusterBar({ label, pct, desc, weight, typical }) {
  const barColor = pct >= 65 ? COLORS.accent : pct >= 40 ? "#C47A00" : COLORS.teal;
  const bgColor = pct >= 65 ? COLORS.accentPale : pct >= 40 ? "#FFF3CC" : COLORS.tealPale;

  return (
    <div style={{ padding: "16px 20px", background: bgColor, borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 15, fontWeight: 700, color: COLORS.ink }}>{label}</span>
          <span style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 11, color: COLORS.mutedLight }}>{weight}</span>
        </div>
        <span style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, fontWeight: 700, color: barColor }}>{pct}%</span>
      </div>
      <div style={{ position: "relative", height: 6, background: COLORS.warm, borderRadius: 3, marginBottom: 8, overflow: "visible" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: barColor, borderRadius: 3, transition: "width 1s ease" }} />
        {/* Typical range marker */}
        {typical != null && (
          <div style={{
            position: "absolute", top: -3, left: `${typical}%`, transform: "translateX(-50%)",
            width: 2, height: 12, background: COLORS.ink, opacity: 0.25, borderRadius: 1,
          }} />
        )}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 13, color: COLORS.muted, margin: 0 }}>{desc}</p>
        {typical != null && (
          <span style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 11, color: COLORS.mutedLight, flexShrink: 0, marginLeft: 12 }}>
            Typical: ~{typical}%
          </span>
        )}
      </div>
    </div>
  );
}

function NextStep({ icon, title, body }) {
  return (
    <div style={{ display: "flex", gap: 16, padding: "18px 20px", background: COLORS.paper, borderRadius: 8, border: `1px solid ${COLORS.warm}` }}>
      <span style={{ fontSize: 22, flexShrink: 0 }}>{icon}</span>
      <div>
        <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 16, fontWeight: 700, color: COLORS.ink, margin: "0 0 4px" }}>{title}</p>
        <p style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 14, color: COLORS.inkLight, lineHeight: 1.6, margin: 0 }}>{body}</p>
      </div>
    </div>
  );
}

// ─── APP ROOT ────────────────────────────────────────────────────────

function App() {
  const [sectionIndex, setSectionIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [context, setContext] = useState({});
  const [fontsLoaded, setFontsLoaded] = useState(false);

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap";
    document.head.appendChild(link);
    link.onload = () => setFontsLoaded(true);
    setTimeout(() => setFontsLoaded(true), 1500);
  }, []);

  const questionSections = SECTIONS.filter((s) => s.type === "questions");
  const currentSection = SECTIONS[sectionIndex];

  const handleAnswer = (qid, val) => setAnswers((prev) => ({ ...prev, [qid]: val }));
  const goNext = () => setSectionIndex((i) => Math.min(i + 1, SECTIONS.length - 1));
  const goBack = () => setSectionIndex((i) => Math.max(i - 1, 0));

  const showProgress = sectionIndex > 1 && sectionIndex < SECTIONS.length - 1;

  return (
    <div style={{ minHeight: "100vh", background: COLORS.cream, fontFamily: "'Lora', Georgia, serif" }}>
      <style>{`
        * { box-sizing: border-box; }
        body { margin: 0; }
        button { outline: none; }
        button:focus-visible { outline: 2px solid ${COLORS.accent}; outline-offset: 2px; }
      `}</style>

      {showProgress && <ProgressBar current={sectionIndex - 1} total={questionSections.length} />}

      {currentSection.type === "intro" && <IntroScreen onStart={goNext} />}
      {currentSection.type === "context" && <ContextScreen onNext={(ctx) => { setContext(ctx); goNext(); }} />}
      {currentSection.type === "questions" && (
        <QuestionSection
          section={currentSection}
          answers={answers}
          onChange={handleAnswer}
          onNext={goNext}
          onBack={goBack}
          isLast={sectionIndex === SECTIONS.length - 2}
        />
      )}
      {currentSection.type === "results" && <ResultsScreen answers={answers} context={context} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
